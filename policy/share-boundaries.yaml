{
  "version": 2,
  "schema": "json-compatible-yaml",
  "boundaries": {
    "no-outside-sharing": {
      "allows_external": false,
      "allows_repo_access": false,
      "allows_patches": false,
      "disclosure_stage": "none",
      "requires_disclosure_escalation": false,
      "artifact_whitelist": [],
      "field_whitelist": [],
      "snippet_line_limit": 0,
      "description": "No third-party model receives project context. Keep review inside Codex or local tools."
    },
    "redacted-packet": {
      "allows_external": true,
      "allows_repo_access": false,
      "allows_patches": false,
      "disclosure_stage": "redacted",
      "requires_disclosure_escalation": false,
      "artifact_whitelist": ["assignment_summary", "selected_file_snippet", "inline_snippet", "expert_profile", "sanitized_design_notes", "dependency_manifest", "public_urls", "policy_excerpt"],
      "field_whitelist": ["id", "title", "labels", "status", "priority", "description", "acceptance_criteria"],
      "forbidden_fields": ["comments", "raw_output", "full_description", "attachments", "secrets", "credentials"],
      "snippet_line_limit": 80,
      "redaction_profile": "strict",
      "description": "Share only prepared packets, selected snippets, and sanitized evidence. Do not include full Bead JSON, secrets, or private operational context."
    },
    "repo-readonly": {
      "allows_external": true,
      "allows_repo_access": true,
      "allows_patches": false,
      "disclosure_stage": "repo-readonly",
      "requires_disclosure_escalation": true,
      "artifact_whitelist": ["assignment_summary", "readonly_repo_url_or_snapshot_ref", "selected_file_snippet", "inline_snippet", "expert_profile", "public_docs", "policy_excerpt"],
      "field_whitelist": ["id", "title", "labels", "status", "priority", "description", "acceptance_criteria", "dependencies"],
      "forbidden_fields": ["secrets", "credentials", "private_keys", "production_access"],
      "snippet_line_limit": 200,
      "redaction_profile": "standard",
      "description": "The outside contractor may inspect approved repo content read-only and return findings through Beads."
    },
    "patch-branch": {
      "allows_external": true,
      "allows_repo_access": true,
      "allows_patches": true,
      "disclosure_stage": "patch-branch",
      "requires_disclosure_escalation": true,
      "artifact_whitelist": ["assignment_summary", "approved_branch", "selected_file_snippet", "inline_snippet", "expert_profile", "test_commands", "policy_excerpt"],
      "field_whitelist": ["id", "title", "labels", "status", "priority", "description", "acceptance_criteria", "dependencies"],
      "forbidden_fields": ["secrets", "credentials", "private_keys", "production_access"],
      "snippet_line_limit": 300,
      "redaction_profile": "standard",
      "patch_prerequisites": ["explicit patch permission", "approved branch name", "no release/tag authority"],
      "description": "The outside contractor may prepare a focused patch branch when the assigned Bead explicitly allows code changes."
    }
  },
  "redaction_patterns": [
    "(?i)(authorization\\s*:\\s*bearer\\s+)[A-Za-z0-9._~+/=-]+",
    "(?i)(api[_-]?key|access[_-]?key|secret[_-]?access[_-]?key|aws[_-]?access[_-]?key[_-]?id|aws[_-]?secret[_-]?access[_-]?key|token|password|passwd|secret|credential|private[_-]?key|client[_-]?secret|connection[_-]?string|authorization|auth[_-]?token|session[_-]?token|cookie)\\s*[:=]\\s*[^\\s]+",
    "-----BEGIN [A-Z ]+ PRIVATE KEY-----[\\s\\S]*?-----END [A-Z ]+ PRIVATE KEY-----"
  ],
  "never_share": [
    "secrets",
    "private credentials",
    "production access material",
    "unreleased third-party content",
    "personal data not already authorized for the contractor",
    "full Bead JSON in redacted-packet mode"
  ]
}
